<!DOCTYPE html>
<html>
<head>
    <title>Pneumonia Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <style>
        body {
            background-color: #242424;
            background-repeat: no-repeat;
            background-size: cover;
            font-family: Arial, sans-serif;
        }
        h1, h2 {
            color: #fff;
            text-align: center;
        }
        .border-input {
            background-color: rgba(240, 237, 237, 0.614);
            border-radius: 10px;
            border: 2px solid #000;
            padding: 10px;
            width: 1=20%;
            box-sizing: border-box;
        }
        .predict-button {
            background-color: #6ae4d6b5;
            border: none;
            color: #fff;
            border-radius: 8px;
            padding: 10px 20px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: 8%;
            box-sizing: border-box;
        }
        .predict-button:hover {
            background-color: #1c7b6b;
        }
        .image-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        img {
            border: 2px solid #fff;
            max-height: 224px;
            max-width: 224px;
        }
        .result-summary {
            color: #fff;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <hr style="margin-top: 0px; opacity: 1;" color="#2a9d8f" size="10" width="100%"/>
    <h1>Pneumonia <span style="color: #2a9d8f;">Identification</span> using <span style="color: #2a9d8f;">Deep Neural Networks</span></h1>
    <form class="p-3 text-center" action="/" method="post" enctype="multipart/form-data">
        <h2>Please Upload an X-ray Image</h2>
        <input class="border-input" type="file" name="imagefile" required autofocus>
        <br>
        <input class="predict-button mt-3" type="submit" value="Predict">
    </form>
    {% if prediction %}
        <h2 class="result-summary">Person is Pneumonia {{prediction}}</h2>
    {% endif %}
    {% if imagePath %}
        <div class="image-container">
            <img src="{{imagePath}}" alt="Image Not Found">
        </div>
    {% endif %}
</body>
</html>
